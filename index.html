<!DOCTYPE html>
<html>
<head>
    <title>Dollar Clicker</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            image-rendering: pixelated;
            touch-action: manipulation;
        }

        #money {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 45px;
            font-weight: bold;
            text-shadow: 4px 4px #000;
        }

        #dollar {
            width: 180px;
            height: 90px;
            background: #3cb043;
            border: 8px solid #145214;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 70px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            box-shadow: 8px 8px #000;
            image-rendering: pixelated;
            touch-action: manipulation;
        }
    </style>
</head>

<body>

    <div id="money">Money: $0</div>

    <div id="dollar">$</div>

    <script>
        let money = 0;

        const moneyDisplay = document.getElementById("money");
        const dollar = document.getElementById("dollar");

        dollar.addEventListener("click", function() {
            money++;
            moneyDisplay.textContent = "Money: $" + money;
        });
    </script>

</body>
</html>

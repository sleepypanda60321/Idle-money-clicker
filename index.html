<!DOCTYPE html>
<html>
<head>
<title>Dollar Clicker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="money">
    Money: $0
</div>


<div id="stats">

    <button id="backpack">
        🎒
    </button>

    <div id="income">
        +$0 / sec
    </div>

</div>



<div id="inventory">

    INVENTORY

    <br><br>

    🖨️ Printers:
    <span id="printerCount">0</span>

</div>



<div id="dollar">
    $
</div>




<div id="menu">

    <div id="tabs">

        <button class="tab">
            Tab 1
        </button>

        <button class="tab">
            Tab 2
        </button>

        <button class="tab">
            Tab 3
        </button>

        <button class="tab">
            Tab 4
        </button>

        <button class="tab" id="shopTab">
            Shop
        </button>

    </div>



    <div id="content">


        <div id="shop">

            STORE

            <br>

            <button id="printer">

                🖨️ Printer - $50 (+$1/sec)

            </button>

        </div>


    </div>

</div>





<script>

let money = 0;
let income = 0;
let printers = 0;



const moneyDisplay = document.getElementById("money");
const incomeDisplay = document.getElementById("income");




function updateDisplay(){

    moneyDisplay.textContent =
    "Money: $" + Math.floor(money);


    incomeDisplay.textContent =
    "+$" + income + " / sec";

}


function saveGame(){

    localStorage.setItem("money", money);
    localStorage.setItem("income", income);
    localStorage.setItem("printers", printers);
    localStorage.setItem("lastTime", Date.now());

}


function loadGame(){

    money =
    Number(localStorage.getItem("money")) || 0;


    income =
    Number(localStorage.getItem("income")) || 0;


    printers =
    Number(localStorage.getItem("printers")) || 0;



    let lastTime =
    Number(localStorage.getItem("lastTime"));



    if(lastTime){

        let secondsAway =
        Math.floor((Date.now() - lastTime) / 1000);


        let earned =
        secondsAway * income;


        if(earned > 0){

            money += earned;


            alert(
                "While you were away, you earned $" 
                + earned
            );

        }

    }


    updateDisplay();

}




document.getElementById("dollar").onclick = function(){

    money++;

    updateDisplay();

    saveGame();

};



setInterval(function(){

    money += income;

    updateDisplay();

    saveGame();

},1000);



loadGame();


</script>



<script src="shop.js"></script>
<script src="inventory.js"></script>


</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Dollar Clicker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="money">
    <span id="moneyLabel">Money:</span>
    <span id="moneyValue">$0</span>
</div>


<div id="stats">

    <button id="backpack">
        🎒
    </button>

    <div id="income">
        +$0 / sec
    </div>

</div>



<div id="inventory">

    INVENTORY

    <br><br>

    🖨️ Printers:
    <span id="printerCount">0</span>

</div>



<div id="dollar">
    $
</div>




<div id="menu">

 <div id="tabs">

<button class="tab">Tab 1</button>
<button class="tab">Tab 2</button>
<button class="tab" id="shopTab">Shop</button>
<button class="tab">Tab 4</button>
<button class="tab" id="settingsTab">Settings</button>

</div>



    <div id="content">


        <div id="shop">

            STORE

            <br>

            <button id="printer">

                🖨️ Printer - $50 (+$1/sec)

            </button>

        </div>


    </div>

</div>

<div id="settings">

<h2>⚙️ SETTINGS</h2>

<button id="saveButton">
💾 Save Game
</button>

<br><br>

<button id="deleteButton">
Delete All Progress
</button>

</div>

<div id="offlinePopup">

    <div id="offlineBox">

        <button id="closeOffline">✕</button>

        <h2>Welcome Back!</h2>

        <p id="offlineText"></p>

    </div>

</div>


<div id="deletePopup">

<div id="offlineBox">

<button id="closeDelete">✕</button>

<h2>Are you sure?</h2>

<p>
Would you like to delete all your progress?
</p>

<button id="cancelDelete">
Cancel
</button>

<button id="confirmDelete">
Delete
</button>

</div>

</div>
    
<script>

const shopTab = document.getElementById("shopTab");
const settingsTab = document.getElementById("settingsTab");

const shop = document.getElementById("shop");
const settings = document.getElementById("settings");

function openShop() {
    shop.style.display = "block";
    settings.style.display = "none";
}

function openSettings() {
    shop.style.display = "none";
    settings.style.display = "block";
}

shopTab.onclick = openShop;
settingsTab.onclick = openSettings;

// Open Shop automatically on startup
openShop();

let money = 0;
let income = 0;
let printers = 0;



const moneyValue = document.getElementById("moneyValue");
const incomeDisplay = document.getElementById("income");

function formatMoney(num) {

    if (num < 10000) {
        return Math.floor(num).toString();
    }

    const units = [
        "K", "M", "B", "T",
        "Qa", "Qi", "Sx", "Sp",
        "Oc", "No", "Dc"
    ];

    let unit = -1;

    while (num >= 1000 && unit < units.length - 1) {
        num /= 1000;
        unit++;
    }

    return num.toFixed(1).replace(".0", "") + units[unit];

}


function updateDisplay(){

moneyValue.textContent = "$" + formatMoney(money);

let digits = Math.floor(money).toString().length;

if (digits < 7) {
    moneyValue.style.fontSize = "48px";
} else if (digits < 10) {
    moneyValue.style.fontSize = "40px";
} else if (digits < 13) {
    moneyValue.style.fontSize = "32px";
} else {
    moneyValue.style.fontSize = "26px";
}


    incomeDisplay.textContent =
    "+$" + formatMoney(income) + " / sec";

}


function saveGame(){

    localStorage.setItem("money", money);
    localStorage.setItem("income", income);
    localStorage.setItem("printers", printers);
    localStorage.setItem("lastTime", Date.now());

}


function loadGame(){

    money =
    Number(localStorage.getItem("money")) || 0;


    income =
    Number(localStorage.getItem("income")) || 0;


    printers =
    Number(localStorage.getItem("printers")) || 0;



    let lastTime =
    Number(localStorage.getItem("lastTime"));



    if(lastTime){

        let secondsAway =
        Math.floor((Date.now() - lastTime) / 1000);


        let earned =
        secondsAway * income;


        if(earned > 0){

            money += earned;


            showOfflinePopup(earned);

        }

    }


    updateDisplay();

}

document.addEventListener("visibilitychange", function() {

    if (document.visibilityState === "visible") {

        let lastTime = Number(localStorage.getItem("lastTime"));

        if (lastTime) {

            let secondsAway = Math.floor((Date.now() - lastTime) / 1000);

            let earned = secondsAway * income;

            if (earned > 0) {

                money += earned;

                updateDisplay();

                showOfflinePopup(earned);

            }
        }
    }

});


document.getElementById("dollar").onclick = function(){

    money++;

    updateDisplay();

    saveGame();

};



setInterval(function(){

    money += income;

    updateDisplay();

    saveGame();

},1000);

function showOfflinePopup(amount){

    const popup = document.getElementById("offlinePopup");
    const text = document.getElementById("offlineText");
    const close = document.getElementById("closeOffline");

    text.textContent = "While you were away, you earned $" + amount;

    popup.style.display = "flex";

    close.onclick = function(){
        popup.style.display = "none";
    };
}


loadGame();


</script>



<script src="shop.js"></script>

<script src="inventory.js"></script>

<script src="settings.js"></script>




</body>
</html>

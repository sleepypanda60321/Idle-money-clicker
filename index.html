<!DOCTYPE html>
<html>
<head>
    <title>Dollar Clicker</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: white;
        }

        #money {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
        }

        #dollar {
            font-size: 150px;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>

<body>

    <div id="money">Money: $0</div>

    <div id="dollar">💵</div>

    <script>
        let money = 0;

        const moneyDisplay = document.getElementById("money");
        const dollar = document.getElementById("dollar");

        dollar.addEventListener("click", function() {
            money++;
            moneyDisplay.textContent = "Money: $" + money;
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Dollar Clicker</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #222;
            font-family: monospace;
            image-rendering: pixelated;
            touch-action: manipulation;
        }

        #money {
            height: 10px;
            margin-top: 10px;
            margin-left: 10px;
            color: white;
            font-size: 45px;
            font-weight: bold;
            text-shadow: 4px 4px #000;
        }

        #income {
            margin-top: 35px;
            margin-left: 10px;
            color: white;
            font-size: 25px;
            font-weight: bold;
            text-shadow: 3px 3px #000;
        }

        #dollar {
            margin: 30px auto 0 auto;

            width: 180px;
            height: 100px;

            background: #3cb043;
            border: 8px solid #145214;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-size: 70px;
            font-weight: bold;

            box-shadow: 8px 8px #000;

            cursor: pointer;
            user-select: none;
        }
    </style>
</head>

<body>

    <div id="money">Money: $0</div>

    <div id="income">+$0 / sec</div>

    <div id="dollar">$</div>


    <script>
        let money = 0;

        const moneyDisplay = document.getElementById("money");
        const dollar = document.getElementById("dollar");

        dollar.addEventListener("click", function() {
            money++;

            moneyDisplay.textContent = "Money: $" + money;
        });
    </script>

</body>
</html>
